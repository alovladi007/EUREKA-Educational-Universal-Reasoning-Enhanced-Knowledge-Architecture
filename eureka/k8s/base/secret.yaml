# NOTE: This is a template. In production, use sealed-secrets or external secrets operator
# Generate secrets with: kubectl create secret generic eureka-secrets --from-literal=key=value --dry-run=client -o yaml

apiVersion: v1
kind: Secret
metadata:
  name: eureka-secrets
  namespace: eureka
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://eureka:CHANGE_ME_IN_PRODUCTION@postgres-service:5432/eureka"

  # JWT Secret (must be at least 32 characters)
  JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_STRING_AT_LEAST_32_CHARS"

  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_URL: "redis://:CHANGE_ME_IN_PRODUCTION@redis-service:6379/0"

  # MinIO (S3) Credentials
  S3_ACCESS_KEY: "eureka"
  S3_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  S3_ENDPOINT: "http://minio-service:9000"

  # SMTP/Email Credentials
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-password"
  SMTP_FROM_EMAIL: "noreply@eureka.example.com"

  # API Keys (for AI services)
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."

  # Session Secret
  SESSION_SECRET: "CHANGE_ME_TO_A_RANDOM_STRING"

---
# Note: In production, use one of these approaches:
# 1. Sealed Secrets: https://github.com/bitnami-labs/sealed-secrets
# 2. External Secrets Operator: https://external-secrets.io/
# 3. HashiCorp Vault: https://www.vaultproject.io/
# 4. Cloud Provider Secret Manager (AWS Secrets Manager, GCP Secret Manager, Azure Key Vault)
