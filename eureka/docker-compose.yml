# Default `docker compose up -d` starts: db, redis, minio, api-core, web, admin.
# Optional services (Kafka, OpenSearch, Neo4j, tiers, etc.): docker compose --profile full up -d

services:
  # ==========================================
  # Infrastructure
  # ==========================================
  
  db:
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    container_name: eureka-db
    environment:
      POSTGRES_DB: eureka
      POSTGRES_USER: eureka
      POSTGRES_PASSWORD: eureka_dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eureka"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: eureka-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    restart: unless-stopped
    image: minio/minio:latest
    container_name: eureka-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eureka
      MINIO_ROOT_PASSWORD: eureka_minio_password
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  opensearch:
    restart: unless-stopped
    profiles:
      - full
    image: opensearchproject/opensearch:2
    container_name: eureka-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka:
    restart: unless-stopped
    profiles:
      - full
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: eureka-kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/redpanda/data

  # ==========================================
  # Observability (Session 3.4, 2026-05). Behind `--profile dev-obs`
  # so the dev stack stays small unless you opt in.
  #   docker compose --profile dev-obs up -d jaeger
  # ==========================================

  jaeger:
    restart: unless-stopped
    profiles:
      - dev-obs
      - full
    image: jaegertracing/all-in-one:latest
    container_name: eureka-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # Core Services
  # ==========================================

  api-core:
    restart: unless-stopped
    build:
      context: ./services/api-core
      dockerfile: Dockerfile
    container_name: eureka-api-core
    # If direct db/redis/minio hostnames work on your Docker, remove extra_hosts and use:
    # db:5432, redis:6379, http://minio:9000 — see docker-compose.override.example.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # P0.4: use the in-network `db` hostname (port 5432) instead of
      # host.docker.internal:5434. The host-loopback form was Mac-only
      # and broke on Linux/CI; every other service already uses db:5432.
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      # P0-8: Switched to the in-network `redis` hostname so the JWT
      # blacklist (jwt:revoked:* / jwt:revoked-user:*) actually has a
      # reachable Redis. host.docker.internal:6380 doesn't resolve to
      # anything; the blacklist module was failing open on every call.
      REDIS_URL: redis://redis:6379/0
      # P0.4: in-network minio hostname (matches every other service).
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: eureka
      S3_SECRET_KEY: eureka_minio_password
      # P0.1: unified JWT secret. api-core was the lone outlier signing
      # with `dev_jwt_secret_change_in_production` while every other
      # service (incl. test-prep's bridge) verified with the value
      # below, so cross-service auth silently failed. One secret now.
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      ENVIRONMENT: development
      # OpenTelemetry — leave blank to disable. Jaeger lives behind
      # `--profile dev-obs`; container DNS resolves `jaeger` when both
      # are on the same compose network.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_SERVICE_NAME: api-core
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api-core:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # P0.8: explicit healthcheck so dependents (web, admin, tiers) can
    # gate on `condition: service_healthy` instead of racing api-core's
    # ~uvicorn boot. stdlib-only probe — no curl in the slim image.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5

  # P0.6: file-storage was a real service (FE uploads/downloads target
  # NEXT_PUBLIC_FILE_STORAGE_URL = :8300) but had no container — so every
  # upload silently failed. Added here with a Dockerfile + requirements
  # created alongside. Default profile because the FE depends on it.
  file-storage:
    restart: unless-stopped
    build:
      context: ./services/file-storage
      dockerfile: Dockerfile
    container_name: eureka-file-storage
    environment:
      # minio python client wants host:port (no scheme) + S3_SECURE flag.
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: eureka
      S3_SECRET_KEY: eureka_minio_password
      S3_BUCKET_NAME: eureka-files
      S3_SECURE: "false"
      ENVIRONMENT: development
    ports:
      - "8300:8000"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./services/file-storage:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5

  tutor-llm:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/tutor-llm
      dockerfile: Dockerfile
    container_name: eureka-tutor-llm
    environment:
      DATABASE_URL: postgresql+asyncpg://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/1
      OPENSEARCH_URL: http://opensearch:9200
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: development
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis
      - opensearch
    volumes:
      - ./services/tutor-llm:/app

  assess:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/assess
      dockerfile: Dockerfile
    container_name: eureka-assess
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/2
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: eureka
      S3_SECRET_KEY: eureka_minio_password
      ENVIRONMENT: development
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./services/assess:/app

  adaptive:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/adaptive
      dockerfile: Dockerfile
    container_name: eureka-adaptive
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/3
      ENVIRONMENT: development
    ports:
      - "8003:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./services/adaptive:/app

  content:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/content
      dockerfile: Dockerfile
    container_name: eureka-content
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: eureka
      S3_SECRET_KEY: eureka_minio_password
      ENVIRONMENT: development
    ports:
      - "8004:8000"
    depends_on:
      - db
      - minio
    volumes:
      - ./services/content:/app

  analytics:
    restart: unless-stopped
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: eureka-analytics
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379/4
      ENVIRONMENT: development
    ports:
      # P0.7: was 8006 — the frontend's NEXT_PUBLIC_ANALYTICS_URL default
      # is :8005 (and 8005 is the natural slot after content=8004), so the
      # analytics dashboard was calling a port nothing listened on. Aligned.
      - "8005:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./services/analytics:/app

  # ==========================================
  # Academic Tier Services
  # ==========================================

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
  tier-hs:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/tier-hs
      dockerfile: Dockerfile
    container_name: eureka-tier-hs
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/5
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ENVIRONMENT: development
    ports:
      - "8010:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/tier-hs:/app

  tier-ug:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/tier-ug
      dockerfile: Dockerfile
    container_name: eureka-tier-ug
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/6
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ENVIRONMENT: development
    ports:
      - "8011:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/tier-ug:/app

  tier-grad:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/tier-grad
      dockerfile: Dockerfile
    container_name: eureka-tier-grad
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/7
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ENVIRONMENT: development
    ports:
      - "8012:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/tier-grad:/app

  # ==========================================
  # Professional Tier Services
  # ==========================================

  # pro-med removed 2026-05: was a 25-line stub. Real medical-school logic
  # (USMLE, OSCE, clinical cases, AI tutor, 30+ endpoints, 10 DB tables, 4.7k LOC)
  # lives in the medical-school service defined below.

  pro-law:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/pro-law
      dockerfile: Dockerfile
    container_name: eureka-pro-law
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/9
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ABA_COMPLIANCE: "true"
      ENVIRONMENT: development
    ports:
      - "8021:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/pro-law:/app

  pro-mba:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/pro-mba
      dockerfile: Dockerfile
    container_name: eureka-pro-mba
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/10
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ENVIRONMENT: development
    ports:
      - "8022:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/pro-mba:/app

  pro-eng:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ./services/pro-eng
      dockerfile: Dockerfile
    container_name: eureka-pro-eng
    environment:
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/11
      API_CORE_URL: http://api-core:8000
      TUTOR_LLM_URL: http://tutor-llm:8000
      ENVIRONMENT: development
    ports:
      - "8023:8000"
    depends_on:
      - api-core
      - tutor-llm
    volumes:
      - ./services/pro-eng:/app

  # ==========================================
  # Frontend Applications
  # ==========================================

  # XR-9: the web app is served as a PRODUCTION build. `next dev` compiled
  # routes on demand; the ~3k-module three.js XR compiles were repeatedly
  # OOM-killed inside the shared Docker VM (docker events: `oom` before each
  # `die`), each restart wiped the compile cache, and every click after a
  # restart paid a multi-second cold compile. Prebuilt routes serve in ~100ms
  # with a few hundred MB steady memory and no spikes. For HMR development
  # use the `web-dev` service: docker compose --profile dev up -d web-dev
  # (port 4041). Note: production builds hard-disable the dev auto-login
  # (P1.3a by design) — sign in at /auth/login with the seeded demo account.
  web:
    restart: unless-stopped
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: eureka-web
    # Host port is configurable via eureka/.env (WEB_HOST_PORT) if 3000 is taken by another project
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    # P0.8: gate on api-core being healthy (not just started) so the FE
    # doesn't boot against an api-core that's still running migrations.
    depends_on:
      api-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 6

  web-dev:
    profiles:
      - dev
    restart: unless-stopped
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: eureka-web-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_TUTOR_URL: http://localhost:8001
      # Bound V8's heap so a webpack compile spike garbage-collects instead
      # of ballooning toward the VM's OOM killer.
      NODE_OPTIONS: "--max-old-space-size=3072"
    ports:
      - "${WEB_DEV_HOST_PORT:-4041}:3000"
    depends_on:
      api-core:
        condition: service_healthy
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 120s

  admin:
    restart: unless-stopped
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.dev
    container_name: eureka-admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "${ADMIN_HOST_PORT:-3001}:3000"
    # P0.8: gate on api-core health (see web).
    depends_on:
      api-core:
        condition: service_healthy
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
      - /app/.next

  medical-school:
    restart: unless-stopped
    build:
      context: ./services/medical-school
      dockerfile: Dockerfile.nestjs
    container_name: eureka-medical-school
    environment:
      NODE_ENV: development
      # 8030: distinct from pro-med (8020) — see PORT_REFERENCE.md
      PORT: 8030
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
      REDIS_URL: redis://redis:6379/15
      # P0.1: unified JWT secret (was the second outlier alongside
      # api-core). medical-school now verifies api-core-issued tokens.
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-sonnet-4-20250514
      ANTHROPIC_MAX_TOKENS: 4096
      CORS_ORIGIN: http://localhost:3000,http://localhost:4040,http://localhost:4500
    ports:
      - "8030:8030"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/medical-school:/app
      - /app/node_modules
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8030/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ==========================================
  # Phase-2 Advanced Services
  # ==========================================

  pedagogy:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/pedagogy
      dockerfile: Dockerfile
    container_name: eureka-pedagogy
    environment:
      DATABASE_URL: postgresql+asyncpg://eureka:eureka_dev_password@db:5432/eureka_pedagogy
      REDIS_URL: redis://redis:6379/20
      API_CORE_URL: http://api-core:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      COMPLIANCE_ENABLED: "true"
      DKT_HIDDEN_DIM: 128
      IRT_MODEL_TYPE: "2PL"
      ENVIRONMENT: development
    ports:
      - "8040:8040"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ../services/pedagogy:/app
      - ../services/shared:/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8040 --reload

  marketplace:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/marketplace
      dockerfile: Dockerfile
    container_name: eureka-marketplace
    environment:
      DATABASE_URL: postgresql+asyncpg://eureka:eureka_dev_password@db:5432/eureka_marketplace
      REDIS_URL: redis://redis:6379/21
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CONTENT_STORAGE_PATH: /data/marketplace/content
      COMPLIANCE_ENABLED: "true"
      ENVIRONMENT: development
    ports:
      - "8050:8050"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../services/marketplace:/app
      - ../services/shared:/shared
      - marketplace_content:/data/marketplace/content
    command: uvicorn main:app --host 0.0.0.0 --port 8050 --reload

  ai-research:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/ai-research
      dockerfile: Dockerfile
    container_name: eureka-ai-research
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      CHROMA_DB_PATH: /data/research/chromadb
      PAPER_CACHE_DIR: /data/research/papers
      DEFAULT_LLM_MODEL: "gpt-4-turbo-preview"
      ENABLE_AGENT_MEMORY: "true"
      ENVIRONMENT: development
    ports:
      - "8060:8060"
    depends_on:
      kafka:
        condition: service_started
    volumes:
      - ../services/ai-research:/app
      - ../services/shared:/shared
      - ai_research_data:/data/research
    command: uvicorn main:app --host 0.0.0.0 --port 8060 --reload

  # xr-labs: RETIRED (XR-5). XR Labs is served by api-core's /api/v1/xr
  # endpoints (see services/api-core/app/api/v1/endpoints/xr.py) against the
  # tables in ops/db/22_xr_labs.sql; the frontend portals run in-browser.
  # See services/xr-labs/DEPRECATED.md.

  ethics-security:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/ethics-security
      dockerfile: Dockerfile
    container_name: eureka-ethics-security
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_started
    volumes:
      - ../services/ethics-security:/app
      - ../services/shared:/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  data-fabric:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/data-fabric
      dockerfile: Dockerfile
    container_name: eureka-data-fabric
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-eureka_neo4j_dev}
      QDRANT_URL: http://qdrant:6333
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      ENVIRONMENT: development
    ports:
      - "8090:8090"
    depends_on:
      - neo4j
      - qdrant
    volumes:
      - ../services/data-fabric:/app
      - ../services/shared:/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8090 --reload

  institutions:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/institutions
      dockerfile: Dockerfile
    container_name: eureka-institutions
    environment:
      DATABASE_URL: postgresql+asyncpg://eureka:eureka_dev_password@db:5432/eureka_institutions
      REDIS_URL: redis://redis:6379/22
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      ENVIRONMENT: development
    ports:
      - "8100:8100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ../services/institutions:/app
      - ../services/shared:/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8100 --reload

  futures:
    restart: unless-stopped
    profiles:
      - full
    build:
      context: ../services/futures
      dockerfile: Dockerfile
    container_name: eureka-futures
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      ENVIRONMENT: development
    ports:
      - "8110:8110"
    depends_on:
      kafka:
        condition: service_started
    volumes:
      - ../services/futures:/app
      - ../services/shared:/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8110 --reload

  notebook:
    restart: unless-stopped
    build:
      context: ../services/notebook
      dockerfile: Dockerfile
    container_name: eureka-notebook
    environment:
      PORT: 8120
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: eureka
      DB_USER: eureka
      DB_PASSWORD: eureka_dev_password
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      JWT_EXPIRE: 7d
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
      # Both dev origins: the Next app runs on :4040 in this stack, :3000 is the
      # framework default. server.js splits this on commas for the CORS allow-list.
      FRONTEND_URL: http://localhost:3000,http://localhost:4040
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    ports:
      - "8120:8120"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../services/notebook:/app
      - notebook_uploads:/app/uploads
    command: sh -c "npm install && node server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8120/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ==========================================
  # Test Prep Service (Adaptive Learning Platform)
  # ==========================================

  test-prep:
    restart: unless-stopped
    build:
      context: ../services/test-prep
      dockerfile: Dockerfile
    container_name: eureka-test-prep
    environment:
      SECRET_KEY: eureka_test_prep_secret_key_change_in_production
      # task #51 / P1-2: api-core JWT bridge. Setting this lets
      # test-prep's get_current_user accept api-core-issued tokens
      # (sub=UUID) in addition to its own legacy tokens (sub=username).
      # Must match the JWT_SECRET configured on all api-core/web/admin
      # services above so the same signed token verifies across the stack.
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      # NOTE: test-prep uses its OWN database (not the shared `eureka` db) because
      # api-core's `users.id` is UUID while test-prep models declare user_id as
      # VARCHAR — sharing causes FK type-mismatch on table creation.
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka_test_prep
      REDIS_URL: redis://redis:6379/15
      CELERY_BROKER_URL: redis://redis:6379/14
      CELERY_RESULT_BACKEND: redis://redis:6379/13
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Include all dev ports the Next.js app might run on (3000 dev, 4040 prod-restart-script).
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:4040,http://localhost:8000,http://127.0.0.1:3000,http://127.0.0.1:4040
      ENVIRONMENT: development
    ports:
      - "8200:8200"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/test-prep:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8200 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8200/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────
  # Celery worker for test-prep background tasks
  # ─────────────────────────────────────────────────────────────────────
  # The test-prep service configures Celery (see app/core/celery_app.py:
  # `calibrate-questions` hourly, `generate-daily-reports` daily,
  # `cleanup-old-sessions` hourly) but no worker container was running so
  # those tasks never fired. This service runs the worker; the beat
  # service below runs the scheduler that enqueues periodic jobs.
  #
  # Shares the same image and source mount as test-prep (rebuilt by the
  # `test-prep` service above; docker compose caches the build).
  test-prep-worker:
    profiles:
      - full
    build:
      context: ../services/test-prep
      dockerfile: Dockerfile
    container_name: eureka-test-prep-worker
    environment:
      SECRET_KEY: eureka_test_prep_secret_key_change_in_production
      # task #51 / P1-2: api-core JWT bridge. Setting this lets
      # test-prep's get_current_user accept api-core-issued tokens
      # (sub=UUID) in addition to its own legacy tokens (sub=username).
      # Must match the JWT_SECRET configured on all api-core/web/admin
      # services above so the same signed token verifies across the stack.
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka_test_prep
      REDIS_URL: redis://redis:6379/15
      CELERY_BROKER_URL: redis://redis:6379/14
      CELERY_RESULT_BACKEND: redis://redis:6379/13
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/test-prep:/app
    # All three task queues (analytics, email, ml) plus the default queue.
    # See task_routes in core/celery_app.py.
    command: celery -A app.core.celery_app worker --loglevel=info -Q analytics,email,ml,celery
    restart: unless-stopped

  test-prep-beat:
    profiles:
      - full
    build:
      context: ../services/test-prep
      dockerfile: Dockerfile
    container_name: eureka-test-prep-beat
    environment:
      SECRET_KEY: eureka_test_prep_secret_key_change_in_production
      # task #51 / P1-2: api-core JWT bridge. Setting this lets
      # test-prep's get_current_user accept api-core-issued tokens
      # (sub=UUID) in addition to its own legacy tokens (sub=username).
      # Must match the JWT_SECRET configured on all api-core/web/admin
      # services above so the same signed token verifies across the stack.
      JWT_SECRET: eureka_dev_secret_key_change_in_production
      DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka_test_prep
      REDIS_URL: redis://redis:6379/15
      CELERY_BROKER_URL: redis://redis:6379/14
      CELERY_RESULT_BACKEND: redis://redis:6379/13
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/test-prep:/app
    command: celery -A app.core.celery_app beat --loglevel=info
    restart: unless-stopped

  # Supporting infrastructure for Phase-2
  neo4j:
    restart: unless-stopped
    profiles:
      - full
    image: neo4j:5
    container_name: eureka-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-eureka_neo4j_dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    restart: unless-stopped
    profiles:
      - full
    image: qdrant/qdrant:latest
    container_name: eureka-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  kafka_data:
  marketplace_content:
  ai_research_data:
  neo4j_data:
  qdrant_data:
  notebook_uploads:

networks:
  default:
    name: eureka-network
