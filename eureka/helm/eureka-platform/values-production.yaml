# Production environment overrides

global:
  environment: production
  domain: eureka.example.com

apiCore:
  replicaCount: 5
  autoscaling:
    minReplicas: 5
    maxReplicas: 20

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  env:
    LOG_LEVEL: WARNING
    ENVIRONMENT: production

tutorLLM:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 10

  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"

postgresql:
  primary:
    persistence:
      size: 100Gi
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "8Gi"
        cpu: "4000m"

redis:
  master:
    persistence:
      size: 20Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

minio:
  replicas: 4
  persistence:
    size: 500Gi

monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 30d
  grafana:
    enabled: true
  loki:
    enabled: true

secrets:
  externalSecrets:
    enabled: true
    backend: aws-secrets-manager  # or vault, gcpsm, azurekv
