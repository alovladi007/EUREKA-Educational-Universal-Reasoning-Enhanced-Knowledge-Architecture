apiVersion: v2
name: eureka-platform
description: EUREKA Educational Platform - Complete Kubernetes deployment
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - education
  - ai-tutor
  - learning-platform
  - kubernetes

maintainers:
  - name: EUREKA Team
    email: devops@eureka.example.com

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
