# Development environment overrides

global:
  environment: development
  domain: dev.eureka.example.com

apiCore:
  replicaCount: 1
  autoscaling:
    enabled: false

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  env:
    LOG_LEVEL: DEBUG
    ENVIRONMENT: development

tutorLLM:
  replicaCount: 1
  autoscaling:
    enabled: false

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

postgresql:
  primary:
    persistence:
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

redis:
  master:
    persistence:
      size: 5Gi

minio:
  persistence:
    size: 20Gi

monitoring:
  enabled: false

ingress:
  hosts:
    - host: api-dev.eureka.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api-core
    - host: app-dev.eureka.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web-app
