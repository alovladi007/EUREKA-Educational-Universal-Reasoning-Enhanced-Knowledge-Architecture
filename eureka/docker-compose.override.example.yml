# Optional overrides (copy to docker-compose.override.yml — gitignored).
#
# Default in docker-compose.yml uses host.docker.internal + published ports so
# api-core works in environments where container-to-container TCP to db/redis fails.
#
# On a normal Docker Desktop / Linux setup you may prefer in-network URLs — use:
#
# services:
#   api-core:
#     extra_hosts: []
#     environment:
#       DATABASE_URL: postgresql://eureka:eureka_dev_password@db:5432/eureka
#       REDIS_URL: redis://redis:6379/0
#       S3_ENDPOINT: http://minio:9000
#
# If you remap host ports in the db/redis/minio services, update the numbers below.
# services:
#   api-core:
#     extra_hosts:
#       - "host.docker.internal:host-gateway"
#     environment:
#       DATABASE_URL: postgresql://eureka:eureka_dev_password@host.docker.internal:5434/eureka
#       REDIS_URL: redis://host.docker.internal:6380/0
#       S3_ENDPOINT: http://host.docker.internal:9000
