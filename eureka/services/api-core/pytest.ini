[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage settings
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=70

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    e2e: End-to-end tests
    slow: Tests that take a long time to run
    auth: Authentication related tests
    db: Database related tests
    api: API endpoint tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    # python-multipart >= 0.0.13 emits this transitional rename warning when
    # starlette imports it under the legacy `multipart` name. It's a
    # PendingDeprecationWarning (not covered by the DeprecationWarning ignore
    # above), so under `error` it broke COLLECTION of every integration test
    # in CI the moment a fresh resolve picked up a new release. Runtime is
    # unaffected. Drop this when fastapi/starlette are upgraded past the
    # rename.
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning

# Test environment
env =
    ENVIRONMENT=testing
    JWT_SECRET=test_jwt_secret_for_testing_only
    DATABASE_URL=postgresql://eureka:eureka_dev_password@localhost:5434/eureka_test
