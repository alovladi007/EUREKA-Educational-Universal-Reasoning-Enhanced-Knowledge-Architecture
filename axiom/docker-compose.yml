# AXIOM local development stack.
#
# Default up brings the core services online: Postgres (with pgvector), Redis,
# the API, the web app, and the Celery worker and beat. The observability
# profile adds Prometheus and Grafana.
#
# Ports are chosen to avoid clashing with an EUREKA stack on the same machine
# (EUREKA uses 4040, 4041, 8000, 5434, 6381, and others).
#   api 8400, web 4100, postgres 5440, redis 6390, prometheus 9100, grafana 3100

services:
  postgres:
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
      POSTGRES_DB: axiom
    ports:
      # Host port 5441 (5440 is taken by an unrelated project on this machine).
      # Internal services still reach Postgres at postgres:5432 on the network.
      - "5441:5432"
    volumes:
      - axiom_pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      # Host port 6392 (6390 is taken by an unrelated project on this machine).
      # Internal services still reach Redis at redis:6379 on the network.
      - "6392:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AXIOM_ENV: development
      AXIOM_DATABASE_URL: postgresql+asyncpg://axiom:axiom@postgres:5432/axiom
      AXIOM_REDIS_URL: redis://redis:6379/0
      AXIOM_IDENTITY_PROVIDER: hmac
      AXIOM_EUREKA_JWT_SECRET: eureka_dev_secret_key_change_in_production
      AXIOM_EUREKA_JWT_ALGORITHM: HS256
      # Formal-proof track: the image bundles the Lean 4 kernel, so formal-track
      # items are machine-verified rather than routed to manual review.
      AXIOM_FORMAL_VERIFIER: lean
      # Copilot semantic retrieval ranks in Postgres via pgvector (<=> cosine),
      # embedding with the real all-MiniLM-L6-v2 model (384-dim) bundled in the
      # image, not the offline hashed embedder.
      AXIOM_RETRIEVAL_STORE: pgvector
      AXIOM_EMBEDDING_PROVIDER: sentence_transformers
      AXIOM_EMBEDDING_DIM: "384"
      # Copilot reasoning calls EUREKA first (EK-2): the api container also
      # joins the external eureka-network, so api-core is addressed by service
      # name (no host-gateway port collisions). Any failure falls back to the
      # deterministic mock, so this never hard-blocks development.
      AXIOM_REASONING_PROVIDER: eureka
      AXIOM_EUREKA_REASONING_BASE_URL: http://api-core:8000
    networks:
      - default
      - eureka-network
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8400"
    ports:
      - "8400:8400"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8400/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AXIOM_ENV: development
      AXIOM_DATABASE_URL: postgresql+asyncpg://axiom:axiom@postgres:5432/axiom
      AXIOM_REDIS_URL: redis://redis:6379/0
      AXIOM_FORMAL_VERIFIER: lean
      AXIOM_RETRIEVAL_STORE: pgvector
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  beat:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AXIOM_ENV: development
      AXIOM_REDIS_URL: redis://redis:6379/0
    command: celery -A app.worker.celery_app.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  web:
    restart: unless-stopped
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_AXIOM_API_URL: http://localhost:8400
      NEXT_PUBLIC_EUREKA_LOGIN_URL: http://localhost:4040/auth/login
    ports:
      - "4100:4100"
    depends_on:
      - api

  prometheus:
    restart: unless-stopped
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9100:9090"

  grafana:
    restart: unless-stopped
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3100:3000"
    depends_on:
      - prometheus

networks:
  eureka-network:
    external: true

volumes:
  axiom_pg:
