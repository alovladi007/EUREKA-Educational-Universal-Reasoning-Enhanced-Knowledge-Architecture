name: axiom-ci

on:
  push:
    paths:
      - "axiom/**"
  pull_request:
    paths:
      - "axiom/**"

defaults:
  run:
    working-directory: axiom

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: axiom
          POSTGRES_PASSWORD: axiom
          POSTGRES_DB: axiom
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U axiom -d axiom"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6390:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/shared_schemas -e packages/events -e packages/math_core
          pip install -r apps/api/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check apps/api packages
      - name: math_core tests
        working-directory: axiom/packages/math_core
        run: python -m pytest -q
      - name: API tests (offline)
        working-directory: axiom/apps/api
        run: python -m pytest -q
      - name: Migrations up and down (Postgres)
        working-directory: axiom/apps/api
        env:
          AXIOM_DATABASE_URL: postgresql+asyncpg://axiom:axiom@localhost:5440/axiom
        run: |
          alembic upgrade head
          alembic downgrade base

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axiom/apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
