[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axiom-math-core"
version = "0.1.0"
description = "SymPy-based math grading and parameterized-item core for the AXIOM math platform."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [{ name = "AXIOM" }]
keywords = ["math", "grading", "sympy", "cas", "education", "assessment"]
classifiers = [
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Education",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "sympy>=1.12",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.hatch.build.targets.wheel]
packages = ["src/math_core"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "-q"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
