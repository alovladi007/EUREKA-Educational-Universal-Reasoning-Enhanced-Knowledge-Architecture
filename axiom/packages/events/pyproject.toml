[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axiom-events"
version = "0.1.0"
description = "Caliper-style learning event definitions for AXIOM"
requires-python = ">=3.12"
dependencies = ["pydantic>=2"]

[tool.hatch.build.targets.wheel]
packages = ["src/events"]
