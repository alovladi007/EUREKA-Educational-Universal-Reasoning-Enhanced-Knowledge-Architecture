[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axiom-shared-schemas"
version = "0.1.0"
description = "Shared Pydantic v2 schemas for AXIOM services"
requires-python = ">=3.12"
dependencies = ["pydantic>=2"]

[tool.hatch.build.targets.wheel]
packages = ["src/shared_schemas"]
