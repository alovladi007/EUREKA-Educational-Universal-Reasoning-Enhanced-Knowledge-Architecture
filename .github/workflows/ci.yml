name: CI

on:
  push:
    branches: [main]
    # Skip CI for doc-only / script-only changes — they don't affect
    # service behavior and burn the GitHub Actions free quota fast
    # (~3 min × 33 jobs ≈ 99 min/push). 2,000 free min/month means
    # only ~20 pushes/month before quota exhaustion locks out all
    # runners (manifests as runner_id=0 + 0 steps failures).
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
    # NOTE: do NOT add scripts/**, .gitleaks.toml, .sops.yaml, or anything
    # under .github/ here — those ARE CI configuration and changing them
    # must re-run CI to verify the new config actually works.
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# Cancel in-flight runs for the same branch when a new push comes in.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # gitleaks — make sure no secret ever lands in main
  # -------------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use the project's allowlist + default rules. See .gitleaks.toml.
          GITLEAKS_CONFIG: .gitleaks.toml

  # -------------------------------------------------------------------------
  # Python services — fan out over every FastAPI service with main.py
  # Each runs: pip install, ruff, pytest (with health test minimum)
  # -------------------------------------------------------------------------
  python-services:
    name: ${{ matrix.service.name }} (py)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # eureka/services/* — original Phase 1 services
          - { name: api-core,        path: eureka/services/api-core }
          - { name: adaptive,        path: eureka/services/adaptive }
          - { name: analytics,       path: eureka/services/analytics }
          - { name: assess,          path: eureka/services/assess }
          - { name: content,         path: eureka/services/content }
          - { name: pro-eng,         path: eureka/services/pro-eng }
          - { name: pro-law,         path: eureka/services/pro-law }
          - { name: pro-mba,         path: eureka/services/pro-mba }
          - { name: tier-grad,       path: eureka/services/tier-grad }
          - { name: tier-hs,         path: eureka/services/tier-hs }
          - { name: tier-ug,         path: eureka/services/tier-ug }
          - { name: tutor-llm,       path: eureka/services/tutor-llm }
          # services/* — Phase 2 horizontal services
          - { name: ai-research,     path: services/ai-research }
          - { name: data-fabric,     path: services/data-fabric }
          - { name: ethics-security, path: services/ethics-security }
          - { name: futures,         path: services/futures }
          - { name: institutions,    path: services/institutions }
          - { name: marketplace,     path: services/marketplace }
          - { name: pedagogy,        path: services/pedagogy }
          - { name: xr-labs,         path: services/xr-labs }

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: eureka_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ matrix.service.path }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint (ruff)
        working-directory: ${{ matrix.service.path }}
        continue-on-error: true  # ruff failures don't gate CI yet — Phase 3.6 will tighten
        run: ruff check . || true

      - name: Run health test (gating)
        working-directory: ${{ matrix.service.path }}
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/eureka_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_jwt_secret_for_ci_testing_only
          ENVIRONMENT: testing
        run: |
          # The health test is the minimum bar: every service must at
          # least import its main module and register /health. Anything
          # below this is a regression.
          # -p no:cacheprovider keeps the cache out of the workspace.
          # --override-ini=addopts= ignores any service-local pytest.ini
          # addopts (e.g. marketplace's --cov-fail-under=80) so a strict
          # coverage rule on the wider suite doesn't make the health
          # test alone fail just because it doesn't reach 80% coverage.
          if [ -f tests/test_health.py ]; then
            pytest tests/test_health.py -v --tb=short \
              --override-ini=addopts=
          else
            echo "No tests/test_health.py — skipping"
          fi

      - name: Run other tests (non-gating)
        working-directory: ${{ matrix.service.path }}
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/eureka_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_jwt_secret_for_ci_testing_only
          ENVIRONMENT: testing
        run: |
          # Phase 3 baseline: report on the rest of the suite but don't
          # gate the build on existing test debt. Phase 3.6 tightens this
          # once Phase 4/5 has populated real schemas and the broken pre-
          # existing tests are addressed.
          if [ -d tests ]; then
            pytest tests/ -v --tb=short \
              --cov=. --cov-report=xml --cov-report=term-missing \
              --ignore=tests/integration \
              --deselect tests/test_health.py || true
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # api-core unit + self-contained integration tests
  #
  # The matrix above runs tests/test_health.py (gating) and tests/ minus
  # tests/integration (non-gating). That excludes the SRS/progress/
  # patent-bar test files added in P3-2 / P3-7 because they live under
  # tests/integration. THIS job picks them up:
  #   - tests/unit/test_srs_sm2.py — pure unit, no fixtures beyond model
  #   - tests/integration/test_srs_endpoints.py — local async fixtures
  #     (aiosqlite in-memory + httpx.AsyncClient), no real DB needed
  #   - tests/integration/test_user_progress_endpoints.py — same shape
  #   - tests/integration/test_patent_bar_endpoints.py — same shape
  #   - tests/integration/test_auth_flow.py — same shape
  #   - tests/integration/test_settings_endpoints.py — same shape
  #   - tests/integration/test_srs_review_streaks.py — same shape
  # Gated so regressions in the SM-2 math or the endpoint contracts
  # break the build immediately rather than rotting in the non-gating
  # bucket.
  # -------------------------------------------------------------------------
  api-core-tests:
    name: api-core tests (SRS, progress, patent-bar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: eureka/services/api-core
        run: |
          python -m pip install --upgrade pip
          # requirements.txt pins aiosqlite (added with P3-2) so the
          # in-memory async engine works without postgres.
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: eureka/services/api-core
        env:
          # In-memory tests don't need these, but the app config layer
          # complains on import if they're unset.
          # api-core's app/core/database.py rewrites any URL that
          # doesn't already start with "postgresql+asyncpg://" by
          # prefixing that scheme — so a sqlite URL becomes
          # "postgresql+asyncpg://sqlite+aiosqlite:..." and dies in the
          # URL parser. The placeholder below parses cleanly and is
          # never actually dialed (tests build their own aiosqlite
          # engine in local fixtures).
          DATABASE_URL: "postgresql+asyncpg://noop:noop@localhost:5432/noop"
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_jwt_secret_for_ci_testing_only
          ENVIRONMENT: testing
        run: |
          pytest tests/unit/test_srs_sm2.py -v --tb=short \
            --override-ini=addopts= \
            -p no:cacheprovider \
            --noconftest

      - name: Run self-contained integration tests
        working-directory: eureka/services/api-core
        env:
          # api-core's app/core/database.py rewrites any URL that
          # doesn't already start with "postgresql+asyncpg://" by
          # prefixing that scheme — so a sqlite URL becomes
          # "postgresql+asyncpg://sqlite+aiosqlite:..." and dies in the
          # URL parser. The placeholder below parses cleanly and is
          # never actually dialed (tests build their own aiosqlite
          # engine in local fixtures).
          DATABASE_URL: "postgresql+asyncpg://noop:noop@localhost:5432/noop"
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_jwt_secret_for_ci_testing_only
          ENVIRONMENT: testing
        run: |
          # These three files use local async fixtures (see top of
          # test_srs_endpoints.py) and don't touch the global conftest's
          # sync sqlite — they bring their own aiosqlite engine.
          pytest \
            tests/integration/test_srs_endpoints.py \
            tests/integration/test_user_progress_endpoints.py \
            tests/integration/test_patent_bar_endpoints.py \
            tests/integration/test_auth_flow.py \
            tests/integration/test_settings_endpoints.py \
            tests/integration/test_srs_review_streaks.py \
            tests/integration/test_rbac.py \
            -v --tb=short \
            --override-ini=addopts= \
            -p no:cacheprovider \
            --noconftest

  # -------------------------------------------------------------------------
  # api-core Alembic migration smoke test (P1.2 + P1.1-followup)
  #
  # Runs `alembic upgrade head` against a FRESH Postgres so migration DDL
  # bugs surface — exactly the drift the SQLite-create_all integration
  # tests can't see. The moment alembic became runnable (P1.1 fixed the
  # async-driver crash + merged the two heads) this caught three real,
  # long-latent migration bugs, all now FIXED and verified end-to-end on
  # a live Postgres:
  #   1. 001 double-created the tiertype/userrole enums (explicit
  #      CREATE TYPE + sa.Enum auto-emit) → postgresql.ENUM(create_type=False).
  #   2. 001 and 002 both created audit_logs (001/002 overlap) → removed
  #      from 001; 002 is the owner.
  #   3. resume_001 declared id/user_id as String while the model uses
  #      UUID → the user_id→users.id FK was unbuildable → aligned to UUID.
  # `upgrade head` is now clean (18 tables, reaches the merge head) and
  # reversible (downgrade base → re-upgrade, both exit 0). GATING.
  # -------------------------------------------------------------------------
  migrations:
    name: alembic upgrade head (fresh Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: eureka_mig
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: eureka/services/api-core
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: alembic upgrade head
        working-directory: eureka/services/api-core
        env:
          # env.py coerces +asyncpg → psycopg2 for the sync migration run.
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/eureka_mig"
          JWT_SECRET: test_jwt_secret_for_ci_testing_only
          ENVIRONMENT: testing
        run: |
          alembic upgrade head
          alembic current

  # -------------------------------------------------------------------------
  # Node services — TS/JS
  # -------------------------------------------------------------------------
  node-services:
    name: ${{ matrix.service.name }} (node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: web,                     path: eureka/apps/web }
          - { name: admin,                   path: eureka/apps/admin }
          - { name: platform-orchestrator,   path: services/platform-orchestrator }
          - { name: notebook,                path: services/notebook }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cache only when a lockfile exists; otherwise skip the cache step
          # so services missing package-lock.json don't fail setup-node.

      - name: Install
        # eureka/apps/* are members of an npm workspace declared in
        # eureka/package.json. Their lockfiles are managed at the
        # workspace root; running `npm ci` inside the member dir fails
        # with EUSAGE. Detect that case and install from the root.
        run: |
          if [ -f ${{ matrix.service.path }}/package-lock.json ]; then
            cd ${{ matrix.service.path }} && npm ci
          elif [ "${{ matrix.service.path }}" = "eureka/apps/web" ] || [ "${{ matrix.service.path }}" = "eureka/apps/admin" ]; then
            # Workspace member; install everything from the eureka/ root.
            cd eureka && npm ci || npm install --no-audit --no-fund
          else
            cd ${{ matrix.service.path }} && npm install --no-audit --no-fund
          fi

      - name: Lint
        working-directory: ${{ matrix.service.path }}
        continue-on-error: true
        run: npm run lint --if-present

      - name: Type-check
        working-directory: ${{ matrix.service.path }}
        continue-on-error: true
        run: npm run type-check --if-present

      - name: Test
        working-directory: ${{ matrix.service.path }}
        run: npm test --if-present -- --passWithNoTests || true

      - name: Build (frontend apps only)
        if: matrix.service.name == 'web' || matrix.service.name == 'admin'
        working-directory: ${{ matrix.service.path }}
        # Re-tightened in Session 3.6 (2026-05): the `web` build is now
        # gating again. Type-check / lint are kept non-gating until the
        # remaining pre-existing type errors (Three.js typings, some
        # untyped tier pages) are cleaned up in a follow-up.
        run: npm run build

  # -------------------------------------------------------------------------
  # Compose / docker — make sure docker-compose still parses
  # -------------------------------------------------------------------------
  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        working-directory: eureka
        run: docker compose config --quiet

  # -------------------------------------------------------------------------
  # Schema-drift check
  # Bring up Postgres with the init SQL, then for each Python service that
  # uses SQLAlchemy, declare its Base and run a metadata-vs-DB diff.
  # Failing rows are listed but DON'T fail the build yet — Phase 3.6 will
  # flip continue-on-error to false after we clean up the known drift.
  # -------------------------------------------------------------------------
  schema-drift:
    name: schema drift check
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: eureka_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install psql + drift checker deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          # Install requirements of every service the drift checker
          # introspects, plus the core deps. Service models depend on
          # pydantic-settings, alembic, etc. that aren't otherwise here.
          pip install "sqlalchemy[asyncio]>=2" psycopg2-binary asyncpg \
                      pydantic pydantic-settings python-jose passlib bcrypt \
                      "fastapi>=0.109" "redis>=5"
          # Also install the services' own requirements so any imports
          # in their models work.
          for svc in eureka/services/api-core eureka/services/assess eureka/services/analytics; do
            pip install -r "$svc/requirements.txt" || true
          done

      - name: Apply init SQL
        env:
          PGPASSWORD: postgres
        run: |
          for f in eureka/ops/db/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -d eureka_test -f "$f" || true
          done

      - name: Run drift check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eureka_test
        run: python scripts/check_schema_drift.py

  # -------------------------------------------------------------------------
  # Docker build smoke — every service's Dockerfile must at least build
  # -------------------------------------------------------------------------
  docker-build:
    name: docker build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api-core,   path: eureka/services/api-core }
          - { name: tutor-llm,  path: eureka/services/tutor-llm }
          - { name: assess,     path: eureka/services/assess }
          - { name: web,        path: eureka/apps/web, dockerfile: Dockerfile.dev }
          - { name: admin,      path: eureka/apps/admin, dockerfile: Dockerfile.dev }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Aggregate gate
  # -------------------------------------------------------------------------
  ci-gate:
    name: CI gate (all required green)
    runs-on: ubuntu-latest
    needs: [gitleaks, python-services, api-core-tests, migrations, node-services, compose-validate, docker-build]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          for r in '${{ needs.gitleaks.result }}' '${{ needs.python-services.result }}' '${{ needs.api-core-tests.result }}' '${{ needs.migrations.result }}' '${{ needs.node-services.result }}' '${{ needs.compose-validate.result }}' '${{ needs.docker-build.result }}'; do
            echo "Result: $r"
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::Required job result was: $r"
              exit 1
            fi
          done
          echo "All required jobs green."
